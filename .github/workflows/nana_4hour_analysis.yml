name: NANA股票分析-每4小时

on:
  # 定时触发 - 每4小时运行一次
  schedule:
    - cron: '0 */4 * * *'     # 每4小时运行一次
  
  # 手动触发
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full          # 完整分析（股票+大盘）
          - market-only   # 仅大盘复盘
          - stocks-only   # 仅股票分析
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: false
        type: boolean

# 并发控制
concurrency:
  group: nana-stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 随机延迟
        run: sleep $((RANDOM % 60))
      
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 创建必要目录
        run: |
          mkdir -p data logs reports
      
      - name: 执行股票分析
        env:
          # AI配置 - MiniMax (使用OpenAI兼容模式)
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENAI_BASE_URL: 'https://api.minimaxi.chat/v1'
          OPENAI_MODEL: 'MiniMax-M2.5'
          LLM_TEMPERATURE: 0.7
          
          # 搜索服务 - QVeris + MiniMax
          QVERIS_API_KEY: ${{ secrets.QVERIS_API_KEY }}
          MINIMAX_API_KEYS: ${{ secrets.MINIMAX_API_KEYS }}
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          
          # 推送 - 飞书
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          
          # 自选股 - 默认茅台和宁德时代，老板可修改
          STOCK_LIST: ${{ vars.STOCK_LIST || '600519,300750' }}
          MARKET_REVIEW_REGION: 'cn'
          
          # 报告设置
          REPORT_TYPE: 'simple'           # 精简报告
          SINGLE_STOCK_NOTIFY: 'false'    # 汇总推送
          MARKET_REVIEW_ENABLED: 'true'   # 包含大盘复盘
          TRADING_DAY_CHECK_ENABLED: 'true'  # 仅交易日运行
          
          # 系统配置
          LOG_LEVEL: INFO
          MAX_WORKERS: '1'
          REALTIME_SOURCE_PRIORITY: 'tencent,akshare_sina,efinance'
          
        run: |
          echo "=========================================="
          echo "🚀 NANA股票分析系统"
          echo "=========================================="
          echo "⏰ 时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "🤖 模型: Gemini 2.5 Flash"
          echo "📊 数据源: AkShare + 腾讯"
          echo "📱 推送: 飞书"
          echo "=========================================="
          
          # 执行分析
          python main.py
      
      - name: 上传报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nana-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 7
      
      - name: 显示结果
        if: always()
        run: |
          echo "=========================================="
          echo "📊 分析完成"
          echo "=========================================="
          ls -la reports/ 2>/dev/null || echo "无报告"
